version: "3"
services:
  smartdns:
    image: "runshine0819/smartdns:latest"
    container_name: smartdns
    hostname: smartdns
    command: ["/usr/sbin/smartdns","-f","-x","-u","udp://127.0.0.1:12345"]
    network_mode: host
    volumes:
      - ./data/smartdns:/etc/smartdns
    restart: always
    depends_on:
      - smartdns-server
  smartdns-server:
    image: "runshine0819/smartdns-server:latest"
    container_name: smartdns-server
    hostname: smartdns-server
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - CAP_SYS_ADMIN
    environment:
      SMARTDNS_API_TOKEN: changeme
    command: ["bash","-c","/dns_server.py --default --debug --socket=udp://127.0.0.1:12345 --extra=/opt/ --node_id=10.11.200.100 --dns=1.1.1.1 --sqlite=/var/lib/smartdns/smartdns.sqlite3 --api-token=${SMARTDNS_API_TOKEN:-changeme} & /usr/lib/frr/docker-start"]
    volumes:
      - ./data/dnsmasq.d:/etc/dnsmasq.d
      - ./data/frr:/etc/frr
      - ./data/sqlite:/var/lib/smartdns
    restart: always
